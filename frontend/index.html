<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel — AI Toxicity Detection</title>
    <meta name="description" content="Real-time AI-powered content moderation using DistilBERT transformer technology. Analyze text toxicity instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <h1>Sentinel</h1>
            </div>
            <div class="header-stats">
                <div class="header-stat">
                    <span class="header-stat-value" id="totalScans">0</span>
                    <span class="header-stat-label">scans</span>
                </div>
                <div class="header-stat-divider"></div>
                <div class="header-stat">
                    <span class="header-stat-value" id="avgScore">—</span>
                    <span class="header-stat-label">avg</span>
                </div>
            </div>
        </header>

        <!-- Main Card -->
        <main class="main-card" id="mainCard">
            <!-- Scanner Section -->
            <section class="scanner">
                <div class="section-label">
                    <span>Content Scanner</span>
                </div>

                <div class="textarea-wrapper" id="textareaWrapper">
                    <button class="btn-clear-text hidden" id="clearTextBtn" aria-label="Clear text" title="Clear text">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <textarea
                        id="commentInput"
                        placeholder="What would you like to check?"
                        maxlength="5000"
                        spellcheck="false"
                    ></textarea>
                    <div class="textarea-footer">
                        <span class="char-counter"><span id="charCount">0</span> / 5,000</span>
                    </div>
                </div>

                <div class="quick-tests">
                    <button class="chip chip-safe" data-text="You're doing great, keep up the amazing work! I really appreciate your contributions to the team.">friendly</button>
                    <button class="chip chip-danger" data-text="You are the worst person ever, I absolutely despise everything about you and wish you'd disappear.">hostile</button>
                    <button class="chip chip-neutral" data-text="The quarterly earnings report indicates a 12% increase in revenue compared to the previous fiscal year.">neutral</button>
                    <button class="chip chip-warn" data-text="Shut up you stupid idiot, nobody cares about your dumb opinions. Just stop talking already.">harsh</button>
                </div>

                <button id="scanBtn" class="btn-scan">
                    <div class="btn-scan-content" id="btnContent">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <span>Analyze</span>
                    </div>
                    <div class="btn-scan-loading hidden" id="btnLoading">
                        <div class="dot-pulse">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                        <span>Scanning…</span>
                    </div>
                </button>
            </section>

            <!-- Divider -->
            <div class="section-divider" id="resultsDivider"></div>

            <!-- Results Section -->
            <section class="results" id="resultsSection">
                <div class="section-label">
                    <span>Result</span>
                </div>

                <div class="results-grid">
                    <!-- Gauge -->
                    <div class="gauge-card">
                        <div class="arc-gauge">
                            <svg viewBox="0 0 200 120" id="gaugeSvg">
                                <path class="gauge-track" d="M 15 100 A 85 85 0 0 1 185 100" />
                                <path class="gauge-fill" id="gaugeFill" d="M 15 100 A 85 85 0 0 1 185 100" />
                            </svg>
                            <div class="gauge-center">
                                <span class="gauge-percent" id="gaugePercent">0</span>
                                <span class="gauge-unit">%</span>
                            </div>
                        </div>
                        <span class="gauge-caption">toxicity</span>
                    </div>

                    <!-- Verdict -->
                    <div class="verdict-card" id="verdictCard">
                        <div class="verdict-header">
                            <div>
                                <h3 class="verdict-title" id="verdictTitle">Safe Content</h3>
                                <p class="verdict-desc" id="verdictDesc">This content appears to be safe and non-harmful.</p>
                            </div>
                            <button id="copyResultBtn" class="btn-icon" aria-label="Copy result" title="Copy Result">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 20 0 0 1-2-2V4a2 20 0 0 1 2-2h9a2 20 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                        <div class="confidence-wrapper">
                            <div class="confidence-label">
                                <span>Confidence</span>
                                <span id="confidenceValue">0%</span>
                            </div>
                            <div class="confidence-track">
                                <div class="confidence-fill" id="confidenceFill"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- History Section -->
        <section class="history-section" id="historySection">
            <div class="history-header">
                <h3 class="history-title">Recent</h3>
                <button id="clearHistoryBtn" class="btn-clear">Clear</button>
            </div>
            <div class="history-list" id="historyList"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <span>Sentinel</span>
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="toastMessage">Error</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
